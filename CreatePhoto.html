<!DOCTYPE html>
<html lang="uk">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>PhotoMAP | New photo</title>
	<link rel="icon" href="icons/icon-500x500-remove-bg.png">
	<link rel="stylesheet" href="Style/CreatePhoto.css">
	<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>
	<div id="map"></div>
	
	<div class="menu_conteiner">
		<form class="upload_form_container" id="uploadForm">
			
			<div class="upload_photo">
				<label for="photo-upload" class="upload-btn">
					<img src="icons/AddPhoto3.png" class="upload-photo" id="preview-image" alt="Завантажити фото">
				</label>
				<input type="file" id="photo-upload" name="photo" accept="image/*" hidden>
			</div>

			<div class="details_container">
				<input type="text" id="lens" placeholder="Який об'єктив використовувався?" class="input_detail">
				<input type="text" id="camera" placeholder="Модель камери / телефону" class="input_detail">
				<textarea id="description" placeholder="Додатковий опис..." class="textarea_detail"></textarea>
			</div>

			<div class="location_container">
				<h3>Виберіть місце зйомки</h3>
				<div id="photoMap"></div>
				<input type="hidden" id="latitude" name="latitude">
				<input type="hidden" id="longitude" name="longitude">
			</div>

			<button type="submit" class="button_accept">Завантажити</button>
		</form>
	</div>

	<div class="downbutton">
  		<button class="button_Back"><img src="icons/Back.png" alt="Назад"></button>
  		<button class="button_search"><img src="icons/Search.png" alt="Пошук"></button>
  		<button class="button_profile"><img src="icons/Accaunt.png" alt="Профіль"></button>
	</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="Script/Map_login.js"></script>
<script type="module" src="Script/CreatePhoto.js"></script>
</body>
</html>
