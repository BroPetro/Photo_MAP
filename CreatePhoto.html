<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>PhotoMAP|New photo</title>
	<link rel="icon" href="icons/icon-500x500-remove-bg.png">
	<link rel="stylesheet" href="Style/CreatePhoto.css">
	<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>
	<div id="map"></div>
	<div class="downbutton">
  		<button class="button_Back"><img src="icons/back.png"></button>
  		<button class="button_search"><img src="icons/Search.png"></button>
  		<button class="button_profile"><img src="icons/Accaunt.png"></button>
	</div>
<div class="menu_conteiner">
	<div class="upload_photo">
		<form action="/upload" method="POST" enctype="multipart/form-data" class="upload_form_container">
			<!-- Сама фотографія (label діє як кнопка вибору файлу) -->
			<label for="photo-upload" class="upload-btn">
				<img src="icons/AddPhoto3.png" class="upload-photo" alt="Завантажити фото">
			</label>
			<input type="file" id="photo-upload" name="photo" accept="image/*" hidden>

			<!-- Кнопка відправки, яка буде чітко під фото -->
			<button type="submit" class="button_accept">Завантажити</button>
		</form>
	</div>
	<div class="location_container">
    	<h3>Виберіть місце зйомки</h3>

    	<div id="photoMap"></div>

    	<input type="hidden" id="latitude" name="latitude">
    	<input type="hidden" id="longitude" name="longitude">
	</div>
</div>

	<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
	<script src="Script/Map_login.js"></script>
	<script src="Script/CreatePhoto.js"></script>
</body>
</html>
