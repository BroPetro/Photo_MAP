<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>PhotoMAP</title>

    <link rel="icon" href="icons/icon-500x500-remove-bg.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PhotoMap">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="Style/index.css">
</head>
<body>

<div id="map"></div>

<div class="downbutton">
  <button class="button_search"><img src="icons/Search.png" alt="Пошук"></button>
  <button class="button_create"><img src="icons/AddPhoto2.png" alt="Створити"></button>
  <button class="button_profile"><img src="icons/Accaunt.png" alt="Профіль"></button>
</div>

<button class="button_lacation"><img src="icons/MyLocation2.png" alt="Моя локація"></button>

<div id="details-sidebar" class="details-sidebar">
    <div class="sidebar-drag-handle"></div> <button class="sidebar-close-btn">&times;</button>
    
    <div class="sidebar-content">
        <div class="sidebar-image-container">
            <img id="sidebar-img" src="" alt="Детальне фото">
            <div class="zoom-hint">Натисніть, щоб збільшити</div>
        </div>
        
        <div class="sidebar-info-container">
            <p id="sidebar-description" class="sidebar-desc"></p>
            
            <div class="sidebar-specs">
                <div class="spec-item">
                    <span class="spec-label">Камера</span>
                    <span id="sidebar-camera" class="spec-value"></span>
                </div>
                <div class="spec-item">
                    <span class="spec-label">Об'єктив</span>
                    <span id="sidebar-lens" class="spec-value"></span>
                </div>
                <div class="spec-item">
                    <span class="spec-label">Опубліковано</span>
                    <span id="sidebar-date" class="spec-value"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="fullscreen-overlay" class="fullscreen-overlay">
    <button class="fullscreen-close">&times;</button>
    <img id="fullscreen-img" src="" alt="Повнорозмірне фото">
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module" src="Script/Map.js"></script>
<script type="module" src="Script/index.js"></script>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
    });
}
</script>

</body>
</html>
