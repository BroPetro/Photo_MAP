<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>PhotoMAP</title>

    <link rel="icon" href="icons/icon-500x500-remove-bg.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PhotoMap">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="Style/index.css">
</head>
<body>

<div id="map"></div>

<div class="downbutton">
  <button class="button_search"><img src="icons/Search.png" alt="Пошук"></button>
  <button class="button_create"><img src="icons/AddPhoto2.png" alt="Додати"></button>
  <button class="button_profile"><img src="icons/Accaunt.png" alt="Профіль"></button>
</div>

<button class="button_lacation"><img src="icons/MyLocation2.png" alt="Моя геолокація"></button>

<div id="details-sidebar">
    <div class="sidebar-drag-handle"></div>
    <button class="sidebar-close-btn">&times;</button>
    
    <div class="sidebar-img-container">
        <img id="sidebar-img" src="" alt="Фото деталі">
    </div>

    <div class="sidebar-author-container" id="sidebar-author-link">
        <div class="author-avatar-wrapper">
            <img id="sidebar-author-avatar" src="icons/default-avatar.png" alt="Аватар">
        </div>
        <div class="author-info-text">
            <span>Опублікував</span>
            <strong id="sidebar-author">Анонім</strong>
        </div>
    </div>

    <div class="sidebar-description" id="sidebar-description">
        <i>Без опису</i>
    </div>

    <div class="sidebar-tech-info">
        <div class="tech-item"><strong>Камера:</strong> <span id="sidebar-camera">Не вказано</span></div>
        <div class="tech-item"><strong>Об'єктив:</strong> <span id="sidebar-lens">Не вказано</span></div>
        <div class="tech-item"><strong>Дата:</strong> <span id="sidebar-date">Невідомо</span></div>
    </div>

    <div class="like-section">
        <button id="like-button" class="like-btn">
            <span class="like-icon">&#9825;</span>
            <span id="like-count">0</span>
        </button>
    </div>
</div>

<div id="fullscreen-overlay">
    <button class="fullscreen-close">&times;</button>
    <img id="fullscreen-img" src="" alt="Повний розмір">
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="Script/Map.js"></script>
<script src="Script/index.js" type="module"></script>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
    });
}
</script>
</body>
</html>
